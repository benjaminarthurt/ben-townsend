# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Fix absolute links for sub-path deployment
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          # When the site is deployed to a sub-path (e.g. /ben-townsend/ instead
          # of the custom domain root), absolute href links like /about/ resolve
          # to the wrong origin path and return 404. Rewrite them to include the
          # base path so navigation works at both the default GitHub Pages URL
          # and the custom domain (bentownsend.com).
          if [ -n "$BASE_PATH" ] && [ "$BASE_PATH" != "/" ]; then
            find . -name "*.html" \
              ! -path "./.git/*" \
              ! -path "./.github/*" \
              -print0 | xargs -0 sed -i \
              -e "s|href=\"/\([^\"]*\)\"|href=\"${BASE_PATH}/\1\"|g" \
              -e "s|src=\"/\([^\"]*\)\"|src=\"${BASE_PATH}/\1\"|g"
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
